<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=393px, initial-scale=1.0" />
  <title>MuvMi Pass Benefits</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { -webkit-user-drag: none; user-select: none; }

    body {
      background: #F0F2F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px 16px;
    }

    .phone {
      width: 393px;
      height: 852px;
      background: #E7EEFC;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #1a1a1a,
        0 0 0 12px #3a3a3a,
        0 32px 64px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 200;
    }

    /* Scrollable inner */
    .screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .screen::-webkit-scrollbar { display: none; }

    /* ── Header text ── */
    .hero-title {
      padding: 44px 33px 0;
      font-size: 40px;
      font-weight: 700;
      color: #0D57E2;
      line-height: 60px;
      letter-spacing: 0.25px;
    }

    /* ── Hero image block ── */
    .hero-block {
      margin: 16px 17px 0;
      width: 355px;
      height: 278px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: #C5D9F0;
    }
    .hero-block img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
    }
    /* Dark overlay card at bottom of hero */
    .hero-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to bottom, rgba(13,39,90,0.0) 0%, rgba(13,39,90,0.88) 40%, rgba(13,39,90,0.95) 100%);
      padding: 20px 16px 16px;
    }
    .hero-overlay-title {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      line-height: 36px;
      letter-spacing: 0.25px;
    }
    .hero-overlay-body {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      line-height: 22px;
      letter-spacing: 0.25px;
      margin-top: 2px;
    }
    /* Pagination dots */
    .hero-dots {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
    }
    .dot.active { background: #fff; }

    /* ── Benefit cards ── */
    .cards-section {
      padding: 16px 17px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .benefit-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 101px;
    }
    .benefit-icon {
      width: 47px;
      height: 47px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .benefit-icon img { width: 100%; height: 100%; object-fit: contain; }
    .benefit-text {}
    .benefit-title {
      font-size: 24px;
      font-weight: 600;
      color: #0D57E2;
      line-height: 28px;
      letter-spacing: 0.25px;
    }

    /* ── CTA buttons ── */
    .cta-section {
      padding: 24px 17px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-get-pass {
      width: 100%;
      height: 52px;
      background: #0D57E2;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.25px;
    }
    .btn-maybe-later {
      width: 100%;
      height: 48px;
      background: transparent;
      color: #0D57E2;
      border: 1.5px solid #0D57E2;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.25px;
    }

    /* Home indicator */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .home-indicator-bar { width: 130px; height: 5px; background: #1a1a1a; border-radius: 100px; }
  </style>
</head>
<body>
<div class="phone">
  <div class="screen">

    <!-- Title -->
    <p class="hero-title">What You Get<br>with MuvMi Pass</p>

    <!-- Hero image -->
    <div class="hero-block">
      <img src="images/figma/pass-hero-photo.jpg" alt="Explore Bangkok" />
      <div class="hero-overlay">
        <p class="hero-overlay-title">Explore without Limits</p>
        <p class="hero-overlay-body">Unlimited rides all day. Book<br>instantly in the app</p>
        <div class="hero-dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>

    <!-- Benefit cards -->
    <div class="cards-section">
      <div class="benefit-card">
        <div class="benefit-icon">
          <img src="images/figma/pass-icon-pay.svg" alt="" />
        </div>
        <div class="benefit-text">
          <p class="benefit-title">Pay Once,<br>Zero Hassle</p>
        </div>
      </div>
      <div class="benefit-card">
        <div class="benefit-icon">
          <img src="images/figma/pass-icon-guide.svg" alt="" />
        </div>
        <div class="benefit-text">
          <p class="benefit-title">Your In-App<br>Travel Guide</p>
        </div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-section">
      <button class="btn-get-pass" onclick="window.location.href='travel-pass.html'">Next</button>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>

  </div>
</div>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');</script>
</body>
</html>
