<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D57E2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tourist Planner" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="images/icon-192.png" />
  <link rel="stylesheet" href="mobile.css" />
  <title>Planner — muvmi Tourist</title>
  <!-- SortableJS for smooth drag-to-reorder -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F0F2F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px 16px;
    }

    /* ── Phone Frame ── */
    .phone {
      width: 393px;
      min-height: 852px;
      background: #fff;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #1a1a1a,
        0 0 0 12px #3a3a3a,
        0 32px 64px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Notch */
    .phone::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      background: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 20px 6px;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #4F4F4F;
      letter-spacing: -0.2px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-icons svg { display: block; }

    /* ── Nav Bar ── */
    .nav-bar {
      height: 64px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      /* box-shadow: 0 0 4px rgba(0,0,0,0.1); */
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .btn-back {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      color: #4F4F4F;
    }
    .btn-back svg { display: block; }
    .nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 600;
      color: #4F4F4F;
      white-space: nowrap;
    }
    .btn-add-stop {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 600;
      color: #0D57E2;
      letter-spacing: 0.25px;
      padding: 4px;
    }
    .btn-add-stop:hover { opacity: 0.75; }

    /* ── Action Bar ── */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #EEEEEE;
      background: #fff;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .action-bar::-webkit-scrollbar { display: none; }
    .action-bar.dragging { cursor: grabbing; user-select: none; }
    .normal-actions { flex-shrink: 0; }
    .edit-actions   { flex-shrink: 0; margin-left: auto; }
    .btn-auto-arrange {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #0D57E2;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 5px 16px;
      height: 32px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.25px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-auto-arrange:hover { opacity: 0.85; }
    .btn-auto-arrange svg { flex-shrink: 0; }
    .btn-auto-arrange.arranging {
      pointer-events: none;
      opacity: 0.75;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-auto-arrange.arranging .arrange-icon { display: none; }
    .btn-auto-arrange.arranging .arrange-spinner { display: block; }
    .arrange-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      flex-shrink: 0;
      animation: spin 0.7s linear infinite;
    }

    .btn-map {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      color: #4F4F4F;
      border: 1px solid #E7EEFC;
      border-radius: 16px;
      padding: 5px 16px;
      height: 32px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.25px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-map:hover { background: #F5F8FF; }

    /* ── List ── */
    .place-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
      scrollbar-width: none;
    }
    .place-list::-webkit-scrollbar { display: none; }

    /* ── Card wrapper (li) ── */
    .place-card {
      background: #fff;
      user-select: none;
      border-radius: 0;
      transition: border-radius .2s;
      overflow: hidden;
    }
    /* Expanded: card gets rounded corners like Figma */
    .place-card.expanded {
      border-radius: 16px;
    }

    /* ── Card row (drag handle + thumbnail + info) ── */
    .card-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 16px;
      cursor: pointer;
      transition: background .15s;
    }
    .place-card.expanded .card-row {
      background: #fff;
    }

    /* ── Inline tray ── */
    .card-tray {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .25s cubic-bezier(0.4,0,0.2,1);
      background: #E7EEFC;
      border-radius: 0 0 16px 16px;
    }
    .card-tray-inner {
      overflow: hidden;
    }
    .place-card.expanded .card-tray {
      grid-template-rows: 1fr;
    }
    .card-tray-content {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
    }
    .tray-actions {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .btn-ride {
      flex: 1;
      background: #0D57E2;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 4px 16px;
      font-size: 14px;
      font-weight: 600;
      line-height: 22px;
      letter-spacing: 0.25px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-ride:hover { opacity: 0.85; }
    .btn-more {
      flex: 1;
      background: #fff;
      color: #0D57E2;
      border: 1.5px solid #0D57E2;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 14px;
      font-weight: 600;
      line-height: 22px;
      letter-spacing: 0.25px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-more:hover { background: #EEF3FF; }
    .tray-icon-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      padding-right: 8px;
    }
    .tray-icon {
      width: 24px;
      height: 24px;
      cursor: pointer;
      flex-shrink: 0;
      opacity: 0.85;
      transition: opacity .15s, transform .1s;
    }
    .tray-icon:hover { opacity: 1; transform: scale(1.1); }

    /* Chevron rotation */
    .chevron {
      color: #BBBBBB;
      font-size: 18px;
      line-height: 22px;
      flex-shrink: 0;
      display: inline-block;
      transition: transform .25s cubic-bezier(0.4,0,0.2,1);
    }
    .place-card.expanded .chevron {
      transform: rotate(-90deg);
      color: #0D57E2;
    }

    /* ── Visited state ── */
    .place-card.visited .place-name {
      text-decoration: line-through;
      color: #909090;
    }
    .place-card.visited .category-badge { display: none; }
    .place-card.visited .visited-badge  { display: flex; }

    /* Drag ghost / active state */
    .place-card.sortable-chosen {
      background: #F5F8FF;
      box-shadow: 0 4px 16px rgba(13,87,226,0.12);
      transform: scale(1.015);
      z-index: 100;
    }
    .place-card.sortable-ghost {
      opacity: 0.35;
      background: #EEF3FF;
    }

    /* Drag Handle — hidden until edit mode */
    .drag-handle {
      display: none;
      flex-direction: column;
      gap: 3px;
      padding: 4px 2px;
      cursor: grab;
      flex-shrink: 0;
      opacity: 0.45;
      transition: opacity .15s;
    }
    .drag-handle:active { cursor: grabbing; }
    .place-card:hover .drag-handle { opacity: 0.8; }
    .drag-handle span {
      display: block;
      width: 14px;
      height: 2px;
      background: #909090;
      border-radius: 1px;
    }

    /* Thumbnail */
    .thumbnail {
      width: 48px;
      height: 48px;
      border-radius: 9px;
      object-fit: cover;
      background: #EEEEEE;
      flex-shrink: 0;
    }

    /* Card Info */
    .card-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .place-name {
      font-size: 14px;
      font-weight: 600;
      color: #4F4F4F;
      line-height: 22px;
      letter-spacing: 0.25px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .chevron {
      color: #BBBBBB;
      font-size: 18px;
      line-height: 22px;
      flex-shrink: 0;
    }

    /* Meta row */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .distance {
      font-size: 12px;
      font-weight: 500;
      color: #909090;
      line-height: 18px;
      letter-spacing: 0.25px;
      min-width: 36px;
    }

    /* Category badge */
    .badge {
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 18px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-temple   { background: #E7EEFC; color: #4F4F4F; }
    .badge-landmark { background: #FCF8E7; color: #4F4F4F; }
    .badge-museum   { background: #FCE7E7; color: #4F4F4F; }

    /* Visited badge */
    .badge-visited {
      display: flex;
      align-items: center;
      gap: 3px;
      background: #0D57E2;
      color: #fff;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 18px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-visited svg { display: block; }
    /* Hide visited badge by default — shown only when .visited is on parent */
    .visited-badge { display: none; }

    /* Hours */
    .hours-row {
      display: flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
    }
    .open-label {
      font-size: 12px;
      font-weight: 500;
      color: #4BCD82;
      line-height: 18px;
      letter-spacing: 0.25px;
    }
    .hours-label {
      font-size: 12px;
      font-weight: 500;
      color: #909090;
      line-height: 18px;
      letter-spacing: 0.25px;
    }

    /* ── Home Indicator ── */
    .home-indicator {
      height: 34px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-indicator-bar {
      width: 130px;
      height: 5px;
      background: #1a1a1a;
      border-radius: 100px;
    }

    /* ── Hint label ── */
    .drag-hint { display: none; }

    /* ── Edit button (in normal action bar) ── */
    .btn-edit {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      color: #4F4F4F;
      border: 1px solid #E7EEFC;
      border-radius: 16px;
      padding: 5px 16px;
      height: 32px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.25px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-edit:hover { background: #F5F8FF; }

    /* ── Done button (nav bar, edit mode only) ── */
    .btn-done {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #0D57E2;
      letter-spacing: 0.25px;
      padding: 4px;
    }
    body.edit-mode .btn-done    { display: block; }
    body.edit-mode .btn-add-stop { display: none; }
    body.edit-mode .btn-back     { visibility: hidden; }

    /* ── Action bar: swap normal ↔ edit actions ── */
    .normal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .edit-actions {
      display: none;
      align-items: center;
      gap: 8px;
    }
    body.edit-mode .normal-actions { display: none; }
    body.edit-mode .edit-actions   { display: flex; }

    /* Delete toolbar button */
    .btn-delete-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #F05555;
      color: #fff;
      border: 1px solid #F05555;
      border-radius: 16px;
      padding: 5px 16px;
      height: 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity .15s;
    }
    .btn-delete-toolbar.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Select all toolbar button */
    .btn-select-all {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #4F4F4F;
      border: 1.5px solid #0D57E2;
      border-radius: 16px;
      padding: 5px 16px;
      height: 32px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-select-all:hover { background: #F5F8FF; }
    .btn-select-all.all-selected {
      background: #0D57E2;
      color: #fff;
      border-color: #0D57E2;
    }
    .btn-select-all.all-selected:hover { background: #0a49c4; }
    .select-all-radio {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.6px solid #909090;
      flex-shrink: 0;
      position: relative;
      transition: border-color .15s, background .15s;
    }
    .btn-select-all.all-selected .select-all-radio {
      border-color: #fff;
      background: #fff;
    }
    .btn-select-all.all-selected .select-all-radio::after {
      content: '';
      position: absolute;
      top: 2px; left: 4px;
      width: 4px; height: 7px;
      border: 1.5px solid #0D57E2;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* ── Tap hint (normal mode) ── */
    .tap-hint {
      text-align: center;
      font-size: 11px;
      color: #BBBBBB;
      padding: 8px 16px 2px;
      letter-spacing: 0.2px;
      flex-shrink: 0;
      line-height: 16px;
    }
    body.edit-mode .tap-hint { display: none; }

    /* ── Reorder hint (edit mode only) ── */
    .reorder-hint {
      display: none;
      text-align: center;
      font-size: 11px;
      color: #BBBBBB;
      padding: 8px 0 2px;
      letter-spacing: 0.2px;
      flex-shrink: 0;
    }
    body.edit-mode .reorder-hint { display: block; }

    /* ── Per-card checkbox (right of name-row) ── */
    .card-checkbox {
      display: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      appearance: none;
      border: 1px solid #909090;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: border-color .15s, background .15s;
    }
    .card-checkbox:checked {
      border-color: #0D57E2;
      background: #0D57E2;
    }
    .card-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 3px; left: 6px;
      width: 5px; height: 8px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* ── Edit mode: show/hide elements ── */
    body.edit-mode .drag-handle   { display: flex; }
    body.edit-mode .card-checkbox { display: block; }
    body.edit-mode .chevron       { display: none; }

    /* In edit mode: no expand on click */
    body.edit-mode .card-row { cursor: pointer; }
    body.edit-mode .place-card.expanded .card-tray {
      grid-template-rows: 0fr;
    }

    /* Keep drag-hint hidden always */
    .drag-hint { display: none; }

    /* ── Delete confirmation overlay ── */
    .delete-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 300;
      align-items: flex-end;
      border-radius: inherit;
    }
    .delete-overlay.visible { display: flex; }

    .delete-sheet {
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 24px 16px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .delete-overlay.visible .delete-sheet { transform: translateY(0); }

    .delete-sheet-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }
    .delete-title {
      font-size: 16px;
      font-weight: 600;
      color: #0D57E2;
      line-height: 24px;
      letter-spacing: 0.25px;
    }
    .delete-subtitle {
      font-size: 14px;
      font-weight: 600;
      color: #4F4F4F;
      line-height: 22px;
      letter-spacing: 0.25px;
    }

    /* Preview area wrapper */
    .delete-preview-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      overflow: hidden;
    }
    .delete-count-label {
      font-size: 14px;
      font-weight: 600;
      color: #4F4F4F;
      line-height: 22px;
      letter-spacing: 0.25px;
    }
    /* Scrollable list of cards — collapsed to 1 card by default */
    .delete-preview-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 116px;
      overflow: hidden;
      transition: max-height .35s ease;
    }
    .delete-preview-list.expanded {
      max-height: 340px;
      overflow-y: auto;
    }
    /* Fade gradient hinting hidden content below */
    .see-more-gradient {
      height: 56px;
      margin-top: -56px;
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%);
      pointer-events: none;
      position: relative;
      z-index: 1;
      transition: opacity .25s;
    }
    .delete-preview-list.expanded ~ .see-more-gradient {
      opacity: 0;
    }
    /* Individual card */
    .delete-preview-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border: 1px solid #E7EEFC;
      border-radius: 16px;
      min-height: 80px;
      flex-shrink: 0;
    }
    .delete-preview-thumb {
      width: 48px;
      height: 48px;
      border-radius: 9px;
      object-fit: cover;
      flex-shrink: 0;
      background: #EEE;
    }
    .delete-preview-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .delete-preview-name {
      font-size: 14px;
      font-weight: 600;
      color: #4F4F4F;
      line-height: 22px;
      letter-spacing: 0.25px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .delete-preview-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .delete-preview-dist {
      font-size: 12px;
      color: #939598;
      line-height: 18px;
      flex-shrink: 0;
    }
    .delete-preview-tag {
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 18px;
      background: #E7EEFC;
      color: #4F4F4F;
      white-space: nowrap;
    }
    /* See more toggle */
    .btn-see-more {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #0D57E2;
      letter-spacing: 0.25px;
      padding: 2px 0;
      width: 100%;
    }
    .btn-see-more svg { transition: transform .25s; flex-shrink: 0; }
    .btn-see-more.expanded svg { transform: rotate(180deg); }

    .delete-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .btn-confirm-remove {
      width: 100%;
      background: #F05555;
      color: #fff;
      border: 1px solid #F05555;
      border-radius: 24px;
      padding: 8px 16px;
      font-size: 18px;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 0.25px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-confirm-remove:hover { opacity: 0.85; }
    .btn-cancel-remove {
      width: 100%;
      background: #fff;
      color: #0D57E2;
      border: 1px solid #0D57E2;
      border-radius: 24px;
      padding: 8px 16px;
      font-size: 18px;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 0.25px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-cancel-remove:hover { background: #F5F8FF; }

    /* ── Empty State ── */
    .empty-state {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 32px 48px;
      text-align: center;
    }
    .empty-state.visible { display: flex; }
    .empty-illustration {
      width: 128px;
      height: 88px;
      flex-shrink: 0;
    }
    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: #4F4F4F;
      line-height: 24px;
      letter-spacing: 0.25px;
    }
    .empty-subtitle {
      font-size: 14px;
      font-weight: 500;
      color: #909090;
      line-height: 22px;
      letter-spacing: 0.25px;
      max-width: 220px;
    }
    .btn-add-first-stop {
      width: 225px;
      background: #0D57E2;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 24px;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
      letter-spacing: 0.25px;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: 8px;
    }
    .btn-add-first-stop:hover { opacity: 0.85; }

    /* ── Auto-arrange disabled (empty state) ── */
    .btn-auto-arrange.disabled {
      background: #CCCCCC;
      color: #909090;
      cursor: default;
      pointer-events: none;
    }
    .btn-auto-arrange.disabled svg path { fill: #909090; }

<script>
  const list = document.getElementById('planner-list');
  let editMode = false;
  let allSelected = false;
  let pendingDeleteCards = [];

  // ── Move all .visited cards to the bottom ──
  function enforceVisitedAtBottom() {
    const visited = [...list.querySelectorAll('.place-card.visited')];
    visited.forEach(card => list.appendChild(card));
  }

  // ── Mark as visited ──
  function markVisited(card) {
    card.classList.remove('expanded');
    card.classList.add('visited');
    enforceVisitedAtBottom();
  }

  // ── Add checkbox to name-row (right side) ──
  function addEditControls(card) {
    const nameRow = card.querySelector('.name-row');
    if (!nameRow || nameRow.querySelector('.card-checkbox')) return;
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'card-checkbox';
    nameRow.appendChild(checkbox);
  }


  // ── Edit mode toggle ──
  function toggleEditMode() {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    if (!editMode) {
      // Reset state on exit
      document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
      allSelected = false;
      document.getElementById('btn-select-all').classList.remove('all-selected');
      updateDeleteBtn();
      document.querySelectorAll('.place-card.expanded').forEach(c => c.classList.remove('expanded'));
    }
  }

  // ── Toggle select all ──
  function toggleSelectAll() {
    allSelected = !allSelected;
    document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = allSelected);
    document.getElementById('btn-select-all').classList.toggle('all-selected', allSelected);
    updateDeleteBtn();
  }

  // ── Auto-arrange: sort cards by distance (nearest first) ──
  function parseDist(text) {
    const t = (text || '').trim().toLowerCase();
    const num = parseFloat(t);
    if (isNaN(num)) return Infinity;
    return t.includes('km') ? num * 1000 : num; // normalise to metres
  }

  document.getElementById('btn-auto-arrange').addEventListener('click', async () => {
    const btn = document.getElementById('btn-auto-arrange');
    if (btn.classList.contains('disabled') || btn.classList.contains('arranging')) return;

    btn.classList.add('arranging');

    // Small delay so spinner renders before heavy DOM work
    await new Promise(r => setTimeout(r, 400));

    const cards = [...list.querySelectorAll('.place-card:not(.visited)')];
    const visitedCards = [...list.querySelectorAll('.place-card.visited')];

    cards.sort((a, b) => {
      const da = parseDist(a.querySelector('.distance')?.textContent);
      const db = parseDist(b.querySelector('.distance')?.textContent);
      return da - db;
    });

    // Re-append in sorted order (visited always stay at bottom)
    cards.forEach(card => list.appendChild(card));
    visitedCards.forEach(card => list.appendChild(card));

    await savePlannerOrder();
    btn.classList.remove('arranging');
  });

  // ── Update delete button state ──
  function updateDeleteBtn() {
    const anyChecked = [...document.querySelectorAll('.card-checkbox')].some(cb => cb.checked);
    document.getElementById('btn-delete-toolbar').classList.toggle('active', anyChecked);
    // Sync select-all visual state
    const all = [...document.querySelectorAll('.card-checkbox')];
    const isAllChecked = all.length > 0 && all.every(c => c.checked);
    allSelected = isAllChecked;
    document.getElementById('btn-select-all').classList.toggle('all-selected', isAllChecked);
  }

  // ── Delete confirmation ──
  function makePreviewCardHTML(card) {
    const img  = card.querySelector('.thumbnail')?.src || '';
    const name = card.querySelector('.place-name')?.textContent || '';
    const dist = card.querySelector('.distance')?.textContent || '';
    const tag  = card.querySelector('.category-badge')?.textContent || '';
    return `<div class="delete-preview-card">
      <img class="delete-preview-thumb" src="${img}" alt="${name}">
      <div class="delete-preview-info">
        <span class="delete-preview-name">${name}</span>
        <div class="delete-preview-meta">
          <span class="delete-preview-dist">${dist}</span>
          <span class="delete-preview-tag">${tag}</span>
        </div>
      </div>
    </div>`;
  }

  const CHEVRON_SVG = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none">
    <path d="M6 9l6 6 6-6" stroke="#0D57E2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  function showDeleteConfirm(cards) {
    pendingDeleteCards = cards;
    const title      = document.getElementById('delete-title');
    const subtitle   = document.getElementById('delete-subtitle');
    const area       = document.getElementById('delete-preview-area');
    const confirmBtn = document.getElementById('btn-confirm-remove');

    title.textContent    = 'Remove this stop?';
    subtitle.textContent = 'This stop will be removed from your planner';

    if (cards.length === 1) {
      confirmBtn.textContent = 'Remove stop';
      area.innerHTML = makePreviewCardHTML(cards[0]);
    } else {
      confirmBtn.textContent = `Remove ${cards.length} stops`;
      const cardsHTML = cards.map(makePreviewCardHTML).join('');
      area.innerHTML = `
        <p class="delete-count-label">${cards.length} stops selected</p>
        <div class="delete-preview-list" id="delete-preview-list">${cardsHTML}</div>
        <div class="see-more-gradient"></div>
        <button class="btn-see-more" id="btn-see-more" onclick="toggleSeeMore()">
          See more ${CHEVRON_SVG}
        </button>`;
    }

    document.getElementById('delete-overlay').classList.add('visible');
  }

  function toggleSeeMore() {
    const listEl = document.getElementById('delete-preview-list');
    const btnEl  = document.getElementById('btn-see-more');
    if (!listEl || !btnEl) return;
    const expanded = listEl.classList.toggle('expanded');
    btnEl.classList.toggle('expanded', expanded);
    btnEl.innerHTML = expanded
      ? `See less ${CHEVRON_SVG}`
      : `See more ${CHEVRON_SVG}`;
  }

  function hideDeleteConfirm() {
    document.getElementById('delete-overlay').classList.remove('visible');
    // Reset expanded state so next open starts collapsed
    const listEl = document.getElementById('delete-preview-list');
    if (listEl) listEl.classList.remove('expanded');
    pendingDeleteCards = [];
  }

  document.getElementById('btn-cancel-remove').addEventListener('click', hideDeleteConfirm);
  document.getElementById('delete-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('delete-overlay')) hideDeleteConfirm();
  });

  document.getElementById('btn-confirm-remove').addEventListener('click', async () => {
    pendingDeleteCards.forEach(card => card.remove());
    hideDeleteConfirm();
    allSelected = false;
    document.getElementById('btn-select-all').classList.remove('all-selected');
    updateDeleteBtn();
    if (editMode) toggleEditMode();
    if (list.querySelectorAll('.place-card').length === 0) setEmptyState(true);
    await savePlannerOrder();
  });

  // ── Bulk delete (opens confirmation) ──
  document.getElementById('btn-delete-toolbar').addEventListener('click', () => {
    const toDelete = [...document.querySelectorAll('.place-card')].filter(
      card => card.querySelector('.card-checkbox')?.checked
    );
    if (toDelete.length > 0) showDeleteConfirm(toDelete);
  });

  // ── Save current order to planner.json ──
  async function savePlannerOrder() {
    try {
      const [plannerRes, stopsRes] = await Promise.all([
        fetch('/api/planner'),
        fetch('/api/stops')
      ]);
      const data  = await plannerRes.json();
      const stops = await stopsRes.json();

      const orderedIds = [...list.querySelectorAll('[data-place-id]')].map(el => el.dataset.placeId);
      const placeMap = Object.fromEntries((data.selectedPlaces || []).map(p => [p.id, p]));
      const ordered = orderedIds.map(id => placeMap[id]).filter(Boolean);
      const remainingIds = new Set(ordered.map(p => p.id));

      // Reconcile addedPacks: remove packs whose stops are all gone
      const packs = stops.packs || {};
      const addedPacks = { ...(data.addedPacks || {}) };
      for (const packId of Object.keys(addedPacks)) {
        const packStopIds = (packs[packId]?.stops || []).map(s => s.id);
        const stillIn = packStopIds.filter(id => remainingIds.has(id)).length;
        if (stillIn === 0) delete addedPacks[packId];
        else addedPacks[packId] = stillIn;
      }

      await fetch('/api/planner', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...data, selectedPlaces: ordered, addedPacks })
      });
    } catch (err) {
      console.error('Failed to save planner:', err);
    }
  }

  // ── Card list click handler ──
  list.addEventListener('click', (e) => {
    // In edit mode: tapping card (not drag-handle or checkbox) toggles checkbox
    if (editMode) {
      if (e.target.closest('.drag-handle')) return;
      const card = e.target.closest('.place-card');
      if (!card) return;
      const cb = card.querySelector('.card-checkbox');
      if (cb && !e.target.matches('.card-checkbox')) {
        cb.checked = !cb.checked;
      }
      updateDeleteBtn();
      return;
    }

    // Normal mode: tray icon clicks (check = visited, trash = delete confirm)
    const trayGroup = e.target.closest('.tray-icon-group');
    if (trayGroup) {
      const card = trayGroup.closest('.place-card');
      const svgs = [...trayGroup.querySelectorAll('svg')];
      const clicked = e.target.closest('svg');
      const idx = svgs.indexOf(clicked);
      if (idx === 0 && card) markVisited(card);
      if (idx === 1 && card) showDeleteConfirm([card]);
      return;
    }

    // Ignore drag-handle and tray area
    if (e.target.closest('.drag-handle') || e.target.closest('.card-tray')) return;

    const card = e.target.closest('.place-card');
    if (!card) return;
    const isExpanded = card.classList.contains('expanded');
    document.querySelectorAll('.place-card.expanded').forEach(c => c.classList.remove('expanded'));
    if (!isExpanded) card.classList.add('expanded');
  });

  // ── Inject places from planner.json ──
  function makePlaceCard(place) {
    const badgeClass = place.tagType === 'green' ? 'badge-landmark' : 'badge-temple';
    const li = document.createElement('li');
    li.className = 'place-card';
    li.dataset.placeId = place.id;
    li.innerHTML = `
      <div class="card-row">
        <div class="drag-handle" title="Drag to reorder"><span></span><span></span><span></span></div>
        <img class="thumbnail" src="${place.imgSrc}" alt="${place.name}" />
        <div class="card-info">
          <div class="name-row">
            <span class="place-name">${place.name}</span>
            <span class="chevron">›</span>
          </div>
          <div class="meta-row">
            <span class="distance">${place.dist}</span>
            <span class="badge ${badgeClass} category-badge">${place.tag}</span>
            <div class="badge-visited visited-badge">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>Visited
            </div>
            <div class="hours-row">
              <span class="open-label">Open</span>
              <span class="hours-label">&nbsp;8:00 - 18:00</span>
            </div>
          </div>
        </div>
      </div>
      <div class="card-tray"><div class="card-tray-inner"><div class="card-tray-content">
        <div class="tray-actions">
          <button class="btn-ride">Request a ride</button>
          <button class="btn-more">More info</button>
        </div>
        <div class="tray-icon-group">
          <svg class="tray-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#0D57E2" stroke-width="1.5"/>
            <path d="M8 12l3 3 5-5" stroke="#0D57E2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg class="tray-icon" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="#E05252" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 11v5M14 11v5" stroke="#E05252" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div></div></div>
    `;
    addEditControls(li);
    return li;
  }

  function setEmptyState(isEmpty) {
    document.getElementById('empty-state').classList.toggle('visible', isEmpty);
    list.style.display = isEmpty ? 'none' : '';
    document.getElementById('btn-auto-arrange').classList.toggle('disabled', isEmpty);
  }

  (async function injectSelectedPlaces() {
    let selected = [];
    try {
      const res = await fetch('/api/planner');
      const data = await res.json();
      selected = data.selectedPlaces || [];
    } catch { selected = []; }

    // Count all cards (static + dynamic)
    const totalStatic = list.querySelectorAll('.place-card').length;

    if (selected.length === 0 && totalStatic === 0) {
      setEmptyState(true);
      return;
    }

    setEmptyState(false);

    const existingIds = new Set(
      [...list.querySelectorAll('[data-place-id]')].map(el => el.dataset.placeId)
    );

    selected.forEach(place => {
      if (existingIds.has(place.id)) return;
      const li = makePlaceCard(place);
      const firstVisited = list.querySelector('.place-card.visited');
      if (firstVisited) list.insertBefore(li, firstVisited);
      else list.appendChild(li);
      existingIds.add(place.id);
    });
  })();

  // ── Drag-to-reorder via SortableJS ──
  Sortable.create(list, {
    handle: '.drag-handle',
    animation: 180,
    easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    dragClass: 'sortable-drag',
    filter: '.visited',           // visited cards cannot be dragged
    delay: 80,
    delayOnTouchOnly: false,
    onStart() {
      document.querySelectorAll('.place-card.expanded').forEach(c => c.classList.remove('expanded'));
    },
    onEnd() {
      // Safety: if a non-visited card was somehow dropped below a visited one, re-sort
      enforceVisitedAtBottom();
    },
  });

  // ── Action bar: mouse drag-to-scroll ──
  const actionBar = document.querySelector('.action-bar');
  let isDown = false, startX, scrollLeft;

  actionBar.addEventListener('mousedown', (e) => {
    isDown = true;
    startX = e.pageX - actionBar.offsetLeft;
    scrollLeft = actionBar.scrollLeft;
    actionBar.classList.add('dragging');
  });
  actionBar.addEventListener('mouseleave', () => { isDown = false; actionBar.classList.remove('dragging'); });
  actionBar.addEventListener('mouseup',    () => { isDown = false; actionBar.classList.remove('dragging'); });
  actionBar.addEventListener('mousemove',  (e) => {
    if (!isDown) return;
    e.preventDefault();
    actionBar.scrollLeft = scrollLeft - (e.pageX - actionBar.offsetLeft - startX);
  });
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');</script>
</body>
</html>
