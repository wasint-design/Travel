<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D57E2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tourist Planner" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="images/icon-192.png" />
  <link rel="stylesheet" href="mobile.css" />
  <title>Map — muvmi Tourist</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { -webkit-user-drag: none; user-select: none; }

    body {
      background: #F0F2F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px 16px;
    }

    /* ── Phone Frame ── */
    .phone {
      width: 393px;
      height: 852px;
      background: #fff;
      border-radius: 48px;
      box-shadow:
        0 0 0 10px #1a1a1a,
        0 0 0 12px #3a3a3a,
        0 32px 64px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }

    /* ── Status Bar ── */
    .status-bar {
      height: 44px;
      background: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 20px 6px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #4F4F4F; letter-spacing: -0.2px; }
    .status-icons { display: flex; align-items: center; gap: 5px; }

    /* ── Nav Bar ── */
    .nav-bar {
      height: 56px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      box-shadow: 0 1px 0 #EEEEEE;
    }
    .btn-back {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; padding: 4px; color: #4F4F4F;
    }
    .nav-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 20px; font-weight: 600; color: #4F4F4F; white-space: nowrap;
    }
    .nav-count {
      font-size: 13px;
      font-weight: 500;
      color: #909090;
      letter-spacing: 0.2px;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      min-height: 0;
      z-index: 1;
    }

    /* Custom Leaflet popup */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 0;
    }
    .leaflet-popup-content {
      margin: 10px 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .popup-name {
      font-weight: 600;
      color: #4F4F4F;
      line-height: 18px;
    }
    .popup-meta {
      font-size: 11px;
      color: #909090;
      margin-top: 2px;
    }
    .leaflet-popup-tip { background: #fff; }

    /* ── Bottom strip ── */
    /* ── Home Indicator ── */
    .home-indicator {
      height: 34px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .home-indicator-bar {
      width: 130px; height: 5px;
      background: #1a1a1a;
      border-radius: 100px;
    }

    /* Leaflet zoom control */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
      border-radius: 8px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      color: #4F4F4F !important;
      font-size: 16px !important;
      line-height: 28px !important;
      width: 28px !important;
      height: 28px !important;
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">5:13</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="7" width="3" height="5" rx="1" fill="#4F4F4F"/>
        <rect x="4.5" y="4.5" width="3" height="7.5" rx="1" fill="#4F4F4F"/>
        <rect x="9" y="2" width="3" height="10" rx="1" fill="#4F4F4F"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#4F4F4F" opacity="0.3"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" fill="#4F4F4F"/>
        <path d="M8 6C6.1 6 4.4 6.8 3.2 8L4.6 9.4C5.5 8.5 6.7 8 8 8s2.5.5 3.4 1.4L12.8 8C11.6 6.8 9.9 6 8 6z" fill="#4F4F4F"/>
        <path d="M8 2C5 2 2.3 3.2.4 5.2L1.8 6.6C3.3 5 5.5 4 8 4s4.7 1 6.2 2.6l1.4-1.4C13.7 3.2 11 2 8 2z" fill="#4F4F4F"/>
      </svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#4F4F4F" stroke-opacity="0.35"/>
        <rect x="2" y="2" width="15" height="8" rx="2" fill="#4F4F4F"/>
        <path d="M23 4v4a2 2 0 000-4z" fill="#4F4F4F" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="btn-back" onclick="window.location.href='planner.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="#4F4F4F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="nav-title">Map</span>
    <span class="nav-count" id="nav-count"></span>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-indicator-bar"></div>
  </div>

</div>

<script src="api.js"></script>
<script>
  const API_BASE = '';
  let map, activeMarker = null;

  function makeMarkerIcon(n, isActive, imgSrc) {
    const size = isActive ? 52 : 44;
    const border = isActive ? '3px' : '2.5px';
    const shadow = isActive
      ? '0 4px 16px rgba(0,0,0,0.35)'
      : '0 2px 8px rgba(0,0,0,0.25)';
    const pointerSize = isActive ? 10 : 8;
    const totalH = size + pointerSize;

    const imgHtml = imgSrc
      ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
      : `<div style="width:100%;height:100%;background:#0D57E2;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;">${n}</div>`;

    const html = `
      <div style="display:flex;flex-direction:column;align-items:center;width:${size}px;">
        <div style="
          width:${size}px;height:${size}px;border-radius:50%;
          border:${border} solid #fff;
          box-shadow:${shadow};
          overflow:hidden;
          background:#e0e0e0;
        ">${imgHtml}</div>
        <div style="
          width:0;height:0;
          border-left:${pointerSize / 2}px solid transparent;
          border-right:${pointerSize / 2}px solid transparent;
          border-top:${pointerSize}px solid #fff;
          filter:drop-shadow(0 2px 2px rgba(0,0,0,0.2));
          margin-top:-1px;
        "></div>
      </div>`;

    return L.divIcon({
      className: '',
      html,
      iconSize: [size, totalH],
      iconAnchor: [size / 2, totalH],
      popupAnchor: [0, -(totalH) + 4],
    });
  }

  async function init() {
    map = L.map('map', {
      zoomControl: false,
      attributionControl: false,
    }).setView([13.7563, 100.5018], 13);

    // Map styles (swap URL to change style):
    // Voyager (Google Maps-like):  https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png
    // Positron (minimal light):    https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png
    // Dark Matter (dark mode):     https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png
    // OpenStreetMap (original):    https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    const stopsData = await fetch(`${API_BASE}/api/stops`).then(r => r.json());

    // Collect all unique places (by id) across attractions + all pack stops
    const seen = new Set();
    const allPlaces = [];
    const add = p => { if (p.lat != null && !seen.has(p.id)) { seen.add(p.id); allPlaces.push(p); } };
    (stopsData.attractions || []).forEach(add);
    Object.values(stopsData.packs || {}).forEach(pack => (pack.stops || []).forEach(add));

    document.getElementById('nav-count').textContent = `${allPlaces.length} stops`;

    const bounds = [];
    const markerRefs = [];

    allPlaces.forEach((place, i) => {
      const coords = [place.lat, place.lng];
      const n = i + 1;
      const imgSrc = place.img || '';

      const marker = L.marker(coords, { icon: makeMarkerIcon(n, false, imgSrc) }).addTo(map);
      marker.bindPopup(`
        <div class="popup-name">${place.name}</div>
        <div class="popup-meta">${place.dist} · ${place.tag}</div>
      `, { closeButton: false, maxWidth: 180 });
      markerRefs.push({ marker, index: i, coords, imgSrc });
      bounds.push(coords);

      function setActive() {
        markerRefs.forEach(({ marker: m, index: mi, imgSrc: mImg }) => {
          m.setIcon(makeMarkerIcon(mi + 1, false, mImg));
        });
        marker.setIcon(makeMarkerIcon(n, true, imgSrc));
      }

      marker.on('click', () => {
        setActive();
        map.flyTo(coords, 15, { duration: 0.6 });
        marker.openPopup();
      });
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [48, 48] });
    }
  }

  init();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');</script>
</body>
</html>
